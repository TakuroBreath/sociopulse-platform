# RU regions reference data — embedded at build time via //go:embed.
#
# This is a representative subset of the 89 RU subjects that Plan 10 (RDD
# generator) and Plan 13 (reports) consume. Coverage strategy:
#
#   * High-population centres (Moscow, SPb, Moscow Oblast, Krasnodar Krai,
#     Sverdlovsk Oblast, Tatarstan, Bashkortostan, Novosibirsk, Samara,
#     Rostov, Chelyabinsk, Nizhny Novgorod) — together ~50 % of the
#     national population. Sufficient for the v1 RDD weighted sampler.
#   * Time-zone variety — entries for Asia/Yekaterinburg, Asia/Omsk,
#     Asia/Novosibirsk, Asia/Krasnoyarsk, Asia/Vladivostok and
#     Asia/Kamchatka so working-hours code (Plan 10 Task 7) can be
#     exercised against multiple offsets.
#
# TODO: expand this list to all 89 subjects before v1 production cut-over
# (tracked separately). The schema is stable; adding rows is a pure data
# task. Mobile DEF prefixes are sourced from Минцифры РФ open registry
# (https://opendata.digital.gov.ru/registry/numeric/) — refresh quarterly.
#
# Each row:
#   code         ISO 3166-2:RU code (RU-MOW, RU-SPE, ...).
#   name_ru      Russian-language display name.
#   name_en      English-language display name (used by export reports).
#   timezone     IANA tz database identifier — bundled into the binary
#                via `_ "time/tzdata"` so `time.LoadLocation` works on
#                FROM-scratch images without alpine tzdata package.
#   abc_flag     true  — the region uses ABC (landline-style) codes
#                false — the region uses DEF (mobile) codes; rdd uses this
#                        for the ABC vs DEF ratio gate. v1 keeps every
#                        entry as DEF since RDD targets cellular numbers.
#   def_prefixes Three-digit mobile area codes (DEF) typically associated
#                with the region. Carrier-by-carrier breakdown is
#                deliberately omitted — RDD weights every prefix in the
#                list equally.

regions:
  - code: RU-MOW
    name_ru: Москва
    name_en: Moscow
    timezone: Europe/Moscow
    abc_flag: false
    def_prefixes:
      - "905"
      - "906"
      - "915"
      - "916"
      - "917"
      - "925"
      - "926"
      - "999"

