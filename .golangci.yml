# golangci-lint v1.59+ config
# Run: make lint

run:
  timeout: 5m
  # Linter target Go version (NOT project Go version — that lives in go.mod).
  # golangci-lint v1.64.8 is built with Go 1.24 and rejects targeting newer.
  # Pin to "1.24" so the pre-built CI binary works. Project go.mod stays at
  # 1.26.1 — golangci-lint just won't enforce 1.26-specific checks (those
  # don't apply to our code yet anyway). Bump to "1.26" once golangci-lint
  # v2.0+ (built with Go 1.26+) is published.
  go: "1.24"
  tests: true

output:
  formats:
    - format: colored-line-number
  sort-results: true

linters:
  disable-all: true
  enable:
    # core correctness
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - typecheck
    # style
    - gofmt
    - goimports
    - misspell
    - revive
    - whitespace
    - wastedassign
    # safety (samber/cc-skills-golang@golang-safety)
    - forcetypeassert        # bare type assertions panic — require comma-ok
    - gosec                  # samber/cc-skills-golang@golang-security
    - bodyclose
    - contextcheck           # samber/cc-skills-golang@golang-context propagation
    - noctx                  # HTTP request without context = ungovernable
    - errname
    - errorlint              # %w vs %v, errors.Is/As — golang-error-handling
    - nilerr
    - rowserrcheck
    - sqlclosecheck
    - exhaustive             # switch over enum must cover all cases (golang-design-patterns enum-1)
    # testing (samber/cc-skills-golang@golang-testing)
    - paralleltest           # t.Parallel() encouraged
    - thelper                # t.Helper() in test helpers
    - testifylint            # testify idioms (require vs assert, etc.)
    # observability (samber/cc-skills-golang@golang-error-handling structured logs)
    - loggercheck            # slog/zap key-value pair correctness
    # complexity
    - gocyclo
    - gocognit
    # boundaries
    - depguard
    - importas
    # idiom (samber/cc-skills-golang@golang-modernize)
    - nakedret
    - prealloc
    - unconvert
    - unparam

linters-settings:
  gocyclo:
    min-complexity: 15
  gocognit:
    min-complexity: 20
  goimports:
    local-prefixes: github.com/sociopulse/platform
  revive:
    rules:
      - name: var-naming
      - name: package-comments
      - name: indent-error-flow
      - name: unexported-return
      - name: receiver-naming
      - name: errorf            # prefer fmt.Errorf over errors.New(fmt.Sprintf)
      - name: error-naming      # ErrXxx for sentinels (golang-error-handling)
      - name: error-return      # error MUST be last return value
      - name: blank-imports     # blank imports require explanation
  errorlint:
    errorf: true                # require %w for wrapping (golang-error-handling §1.4)
    errorf-multi: true
    asserts: true               # require errors.As over type assertion
    comparison: true            # require errors.Is over ==
  # forcetypeassert: no settings to configure — linter is enabled in `linters:`
  # block above. Every type assertion in our code MUST use comma-ok form.
  # See samber/cc-skills-golang@golang-safety §Type-Assertions.
  paralleltest:
    ignore-missing: false        # all tests SHOULD call t.Parallel() unless explicitly excluded
    ignore-missing-subtests: false
  testifylint:
    enable-all: true
    disable:
      - require-error            # opt out of forced require — leave to author judgement
  exhaustive:
    default-signifies-exhaustive: true   # `default:` clause = exhaustive (Go idiom)
  loggercheck:
    slog: true
    zap: true                    # we use zap until ADR-0012 migration
    require-string-key: true     # all key-value pairs must have string keys

  depguard:
    rules:
      # Ban predictable PRNG project-wide. Use math/rand/v2 for non-security
      # randomness (Go 1.22+, samber/cc-skills-golang@golang-modernize §High-1.2)
      # or crypto/rand for tokens/keys (samber/cc-skills-golang@golang-security
      # §Quick-Reference). Direct math/rand also forbids global rand.Seed which
      # was deprecated in Go 1.22.
      banned-stdlib:
        list-mode: lax
        deny:
          # `$` suffix forces exact-match — math/rand v1 is denied while
          # math/rand/v2 (the modern API) stays importable. depguard treats
          # bare `math/rand` as a prefix that also matches `math/rand/v2`.
          - pkg: "math/rand$"
            desc: "use math/rand/v2 for non-security randomness or crypto/rand for tokens/keys (samber/cc-skills-golang@golang-security, @golang-modernize)"
          - pkg: "crypto/cipher.NewCBCEncrypter"
            desc: "CBC lacks authentication — use AES-GCM (samber/cc-skills-golang@golang-security)"
          - pkg: "crypto/cipher.NewCBCDecrypter"
            desc: "CBC lacks authentication — use AES-GCM (samber/cc-skills-golang@golang-security)"
          - pkg: "crypto/des"
            desc: "DES is broken — use AES-256 (samber/cc-skills-golang@golang-security)"
          - pkg: "crypto/md5"
            desc: "MD5 is broken for cryptographic use — use SHA-256+ or argon2id (samber/cc-skills-golang@golang-security)"
          - pkg: "crypto/sha1"
            desc: "SHA-1 has known collision attacks — use SHA-256+ (samber/cc-skills-golang@golang-security)"

      # ADR-0014 — gin is the project router. Forbid alternatives
      # so a careless go-get cannot pull a competing router into go.mod.
      banned-third-party:
        list-mode: lax
        deny:
          - pkg: "github.com/go-chi/chi"
            desc: "use github.com/gin-gonic/gin per ADR-0014"
          - pkg: "github.com/go-chi/chi/v5"
            desc: "use github.com/gin-gonic/gin per ADR-0014"
          - pkg: "github.com/labstack/echo"
            desc: "use github.com/gin-gonic/gin per ADR-0014"
          - pkg: "github.com/gofiber/fiber"
            desc: "use github.com/gin-gonic/gin per ADR-0014"

      module-boundaries:
        list-mode: lax
        files:
          # Same-module composition is allowed: a module's own service/,
          # store/, events/, transport/, module.go composes its own
          # internal packages. The rule denies CROSS-module imports of
          # those packages, not intra-module wiring. cmd/api is the
          # blank-import seam that triggers each service package's init().
          #
          # api/ packages stay subject to the rule on purpose: they are
          # the public surface and must never reach down into
          # service/store/events/transport. The boundary check there is
          # performed by the absence of those imports in api/*.go (and a
          # compile-time test fixture in internal/tenancy/api).
          - "!**/internal/auth/service/**"
          - "!**/internal/auth/store/**"
          - "!**/internal/auth/events/**"
          - "!**/internal/auth/transport/**"
          - "!**/internal/auth/module.go"
          - "!**/internal/crm/service/**"
          - "!**/internal/crm/store/**"
          - "!**/internal/crm/events/**"
          - "!**/internal/crm/transport/**"
          - "!**/internal/crm/module.go"
          - "!**/internal/surveys/service/**"
          - "!**/internal/surveys/store/**"
          - "!**/internal/surveys/events/**"
          - "!**/internal/surveys/transport/**"
          - "!**/internal/surveys/module.go"
          - "!**/internal/dialer/service/**"
          - "!**/internal/dialer/store/**"
          - "!**/internal/dialer/events/**"
          - "!**/internal/dialer/transport/**"
          - "!**/internal/dialer/module.go"
          - "!**/internal/realtime/service/**"
          - "!**/internal/realtime/store/**"
          - "!**/internal/realtime/events/**"
          - "!**/internal/realtime/transport/**"
          - "!**/internal/realtime/module.go"
          - "!**/internal/recording/service/**"
          - "!**/internal/recording/store/**"
          - "!**/internal/recording/events/**"
          - "!**/internal/recording/transport/**"
          - "!**/internal/recording/module.go"
          - "!**/internal/analytics/service/**"
          - "!**/internal/analytics/store/**"
          - "!**/internal/analytics/events/**"
          - "!**/internal/analytics/transport/**"
          - "!**/internal/analytics/module.go"
          - "!**/internal/reports/service/**"
          - "!**/internal/reports/store/**"
          - "!**/internal/reports/events/**"
          - "!**/internal/reports/transport/**"
          - "!**/internal/reports/module.go"
          - "!**/internal/billing/service/**"
          - "!**/internal/billing/store/**"
          - "!**/internal/billing/events/**"
          - "!**/internal/billing/transport/**"
          - "!**/internal/billing/module.go"
          - "!**/internal/audit/service/**"
          - "!**/internal/audit/store/**"
          - "!**/internal/audit/events/**"
          - "!**/internal/audit/transport/**"
          - "!**/internal/audit/module.go"
          - "!**/internal/tenancy/service/**"
          - "!**/internal/tenancy/store/**"
          - "!**/internal/tenancy/events/**"
          - "!**/internal/tenancy/transport/**"
          - "!**/internal/tenancy/module.go"
          - "!**/internal/telephony/service/**"
          - "!**/internal/telephony/store/**"
          - "!**/internal/telephony/events/**"
          - "!**/internal/telephony/transport/**"
          - "!**/internal/telephony/module.go"
          - "!**/cmd/**"
        deny:
          # All cross-module imports must go through the api/ subpackage.
          - pkg: "github.com/sociopulse/platform/internal/auth/service"
            desc: "import from internal/auth/api instead"
          - pkg: "github.com/sociopulse/platform/internal/auth/store"
            desc: "import from internal/auth/api instead"
          - pkg: "github.com/sociopulse/platform/internal/auth/events"
            desc: "import from internal/auth/api instead"
          - pkg: "github.com/sociopulse/platform/internal/crm/service"
            desc: "import from internal/crm/api instead"
          - pkg: "github.com/sociopulse/platform/internal/crm/store"
            desc: "import from internal/crm/api instead"
          - pkg: "github.com/sociopulse/platform/internal/crm/events"
            desc: "import from internal/crm/api instead"
          - pkg: "github.com/sociopulse/platform/internal/surveys/service"
            desc: "import from internal/surveys/api instead"
          - pkg: "github.com/sociopulse/platform/internal/surveys/store"
            desc: "import from internal/surveys/api instead"
          - pkg: "github.com/sociopulse/platform/internal/surveys/events"
            desc: "import from internal/surveys/api instead"
          - pkg: "github.com/sociopulse/platform/internal/dialer/service"
            desc: "import from internal/dialer/api instead"
          - pkg: "github.com/sociopulse/platform/internal/dialer/store"
            desc: "import from internal/dialer/api instead"
          - pkg: "github.com/sociopulse/platform/internal/dialer/events"
            desc: "import from internal/dialer/api instead"
          - pkg: "github.com/sociopulse/platform/internal/realtime/service"
            desc: "import from internal/realtime/api instead"
          - pkg: "github.com/sociopulse/platform/internal/realtime/store"
            desc: "import from internal/realtime/api instead"
          - pkg: "github.com/sociopulse/platform/internal/realtime/events"
            desc: "import from internal/realtime/api instead"
          - pkg: "github.com/sociopulse/platform/internal/recording/service"
            desc: "import from internal/recording/api instead"
          - pkg: "github.com/sociopulse/platform/internal/recording/store"
            desc: "import from internal/recording/api instead"
          - pkg: "github.com/sociopulse/platform/internal/recording/events"
            desc: "import from internal/recording/api instead"
          - pkg: "github.com/sociopulse/platform/internal/analytics/service"
            desc: "import from internal/analytics/api instead"
          - pkg: "github.com/sociopulse/platform/internal/analytics/store"
            desc: "import from internal/analytics/api instead"
          - pkg: "github.com/sociopulse/platform/internal/analytics/events"
            desc: "import from internal/analytics/api instead"
          - pkg: "github.com/sociopulse/platform/internal/reports/service"
            desc: "import from internal/reports/api instead"
          - pkg: "github.com/sociopulse/platform/internal/reports/store"
            desc: "import from internal/reports/api instead"
          - pkg: "github.com/sociopulse/platform/internal/reports/events"
            desc: "import from internal/reports/api instead"
          - pkg: "github.com/sociopulse/platform/internal/billing/service"
            desc: "import from internal/billing/api instead"
          - pkg: "github.com/sociopulse/platform/internal/billing/store"
            desc: "import from internal/billing/api instead"
          - pkg: "github.com/sociopulse/platform/internal/billing/events"
            desc: "import from internal/billing/api instead"
          - pkg: "github.com/sociopulse/platform/internal/audit/service"
            desc: "import from internal/audit/api instead"
          - pkg: "github.com/sociopulse/platform/internal/audit/store"
            desc: "import from internal/audit/api instead"
          - pkg: "github.com/sociopulse/platform/internal/tenancy/service"
            desc: "import from internal/tenancy/api instead"
          - pkg: "github.com/sociopulse/platform/internal/tenancy/store"
            desc: "import from internal/tenancy/api instead"
          - pkg: "github.com/sociopulse/platform/internal/tenancy/events"
            desc: "import from internal/tenancy/api instead"
          - pkg: "github.com/sociopulse/platform/internal/tenancy/transport"
            desc: "import from internal/tenancy/api instead"
          - pkg: "github.com/sociopulse/platform/internal/telephony/service"
            desc: "import from internal/telephony/api instead"
          - pkg: "github.com/sociopulse/platform/internal/telephony/store"
            desc: "import from internal/telephony/api instead"
          - pkg: "github.com/sociopulse/platform/internal/telephony/events"
            desc: "import from internal/telephony/api instead"

      # pgxpool.Pool is reserved for pkg/postgres. Direct use elsewhere risks
      # bypassing WithTenantTx and the SET LOCAL app.tenant_id path that powers
      # RLS (Plan 03 Task 5). Allowed callers: pkg/postgres itself, and
      # internal/tenancy/store admin paths that intentionally operate
      # cross-tenant (Plan 04 Task 7).
      pgxpool-isolation:
        list-mode: lax
        files:
          - "!**/pkg/postgres/**"
          - "!**/internal/tenancy/store/admin_*.go"
          - "!**/cmd/migrator/**"
        deny:
          - pkg: "github.com/jackc/pgx/v5/pgxpool"
            desc: "use pkg/postgres.Pool — direct pgxpool import bypasses SET LOCAL app.tenant_id and RLS"

      # Yandex Cloud SDK is provider-specific. Reserved for KMS resolver
      # (internal/tenancy/store) and recording-uploader (object storage).
      # Anywhere else, the call must go through internal/tenancy/api or
      # pkg/encryption abstractions.
      yandex-sdk-isolation:
        list-mode: lax
        files:
          - "!**/internal/tenancy/store/**"
          - "!**/cmd/recording-uploader/**"
          - "!**/cmd/api/main.go"
        deny:
          - pkg: "github.com/yandex-cloud/go-sdk"
            desc: "Yandex SDK is provider-specific — use abstractions in internal/tenancy/api or pkg/encryption"

      # Doc anchor for the time.After-in-loops policy. depguard cannot detect
      # syntactic context ("inside a for loop"), so the actual enforcement
      # lives in `make grep-time-after` (run in CI). This stanza exists so a
      # reader scanning .golangci.yml finds the rule next to the others.
      # samber/cc-skills-golang@golang-concurrency § BP8: time.After in a loop
      # leaks one timer per iteration; reuse time.NewTimer + Reset.
      time-after-policy:
        list-mode: lax
        deny:
          - pkg: "this-is-a-doc-anchor-for-make-grep-time-after"
            desc: "policy: forbid time.After inside for loops — see Makefile grep-time-after target"

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - gocognit
        - gocyclo
        - errcheck
    - path: cmd/.*/main\.go
      linters:
        - gocyclo
  max-issues-per-linter: 0
  max-same-issues: 0
