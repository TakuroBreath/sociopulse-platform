name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"
  GOLANGCI_LINT_VERSION: v1.64.8
  # Docker Hub repository — public, owned by maxtakuro.
  # Image:   docker.io/maxtakuro/sociopulse-api:<tag>
  DOCKERHUB_REPO: maxtakuro/sociopulse-api

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # Note: install golangci-lint via `go install` rather than the
      # pre-built binary from golangci/golangci-lint-action@v6. The action's
      # binary is shipped with the Go version golangci-lint was built with
      # (Go 1.24 for v1.64.8) and physically cannot typecheck files from
      # Go 1.26+ stdlib (e.g. fips140only_go1.26.go). Building from source
      # against the runner's Go (env.GO_VERSION = 1.26) produces a binary
      # whose embedded parser/typechecker matches our project's Go version.
      - name: Install golangci-lint (built against runner Go)
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}
      - name: Run golangci-lint
        run: golangci-lint run --timeout 5m ./...
      - name: Grep time.After in loops (samber/cc-skills-golang@golang-concurrency § BP8)
        run: make grep-time-after

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run tests
        run: make test
      - name: Run tests with coverage
        run: make test-cover
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.html
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build all binaries
        run: make build
      - name: Verify binaries exist
        run: ls -la bin/

  docker:
    name: Docker build & push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Push step decides itself whether to login & push based on event + secrets.
      # PR builds: build only, no push.
      # main / tag pushes: try to login; if DOCKERHUB_TOKEN is unset, fail-soft
      #   with a warning (image still built and cached, just not pushed).
      - name: Compute push flag
        id: pushflag
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "do_push=false" >> "$GITHUB_OUTPUT"
            echo "reason=PR build (push only on main/tags)" >> "$GITHUB_OUTPUT"
          elif [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "do_push=false" >> "$GITHUB_OUTPUT"
            echo "reason=DOCKERHUB_TOKEN secret not configured — skipping push" >> "$GITHUB_OUTPUT"
          else
            echo "do_push=true" >> "$GITHUB_OUTPUT"
            echo "reason=main/tag push with credentials present" >> "$GITHUB_OUTPUT"
          fi

      - name: Report push decision
        run: |
          echo "::notice::Docker push decision: ${{ steps.pushflag.outputs.do_push }} — ${{ steps.pushflag.outputs.reason }}"

      - name: Login to Docker Hub
        if: steps.pushflag.outputs.do_push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          REPO="${DOCKERHUB_REPO}"
          TAGS="${REPO}:sha-${SHORT_SHA}"
          # On main: also tag :main and :latest
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${REPO}:main,${REPO}:latest"
          fi
          # On vX.Y.Z tag push: also tag :vX.Y.Z
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VTAG="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${REPO}:${VTAG}"
          fi
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Computed tags: ${TAGS}"

      - name: Build (and push if creds present)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.pushflag.outputs.do_push }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.title=sociopulse-api
            org.opencontainers.image.description=СоциоПульс backend API (cmd/api)
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
      # Note: osv-scanner intentionally not used. govulncheck is the canonical
      # Go vulnerability scanner — it analyses reachability (whether our code
      # actually calls vulnerable stdlib/dep functions). osv-scanner reports
      # every stdlib CVE matching go.mod's go directive without reachability
      # analysis, producing high false-positive rate for stdlib vulnerabilities
      # patched in newer point releases. If we add non-Go components later
      # (e.g., npm in /web), revisit osv-scanner for those ecosystems only.

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
