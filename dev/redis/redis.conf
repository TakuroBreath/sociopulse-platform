# dev/redis/redis.conf — Redis config for local dev.
#
# DEV ONLY. Production is Yandex Managed Redis with Sentinel/Cluster.

bind 0.0.0.0
protected-mode no
port 6379
dir /data

# Persistence: RDB only, no AOF for dev (faster restarts).
save 60 1000
appendonly no

# Memory cap to mimic production constraints.
maxmemory 256mb
maxmemory-policy allkeys-lru

# Debug-friendly logging.
loglevel notice
