# dev/postgres/postgresql.conf — minimal Postgres tuning for local dev.
#
# DEV ONLY. Production is managed by Yandex MPG with cloud-managed tuning.

# Networking
listen_addresses = '*'
max_connections = 100

# Memory
shared_buffers = 128MB
work_mem = 4MB

# Query logging (verbose for dev; turn down in production).
log_destination = 'stderr'
log_statement = 'all'
log_duration = off
log_line_prefix = '%t [%p] %q%u@%d '
log_min_duration_statement = 100   # log queries slower than 100ms

# WAL
wal_level = replica
max_wal_size = 1GB
