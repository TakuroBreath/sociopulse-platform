# dev/nats/nats-server.conf — NATS config for local dev.
#
# DEV ONLY. Production uses NATS accounts per system-design §10.2.

port: 4222
http_port: 8222

# Enable JetStream for durable streams (Plan 03 outbox-relay,
# spec §10.2 event streams).
jetstream {
    store_dir: "/data"
    max_memory_store: 64MB
    max_file_store: 1GB
}

# Auth disabled in dev. Production uses NATS accounts (system-design §10.2).
